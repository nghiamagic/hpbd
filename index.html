<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mèo Bắn Tim Thành Chữ Siêu Mượt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05020a;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="loveCanvas"></canvas>

    <script>
        const canvas = document.getElementById('loveCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Tải hình ảnh chú mèo
        const catImg = new Image();
        catImg.src = 'cat1.png'; 

        let catX = 50;
        let catY = 0;
        let mouthX = 0;
        let mouthY = 0;
        let catSize = 140; 

        function updateCatPosition() {

    if (window.innerWidth < 480) {
        catSize = 90;
    } else if (window.innerWidth < 768) {
        catSize = 110;
    } else if (window.innerWidth < 1200) {
        catSize = 130;
    } else {
        catSize = 150;
    }

    catX = window.innerWidth * 0.05;

    catY = window.innerHeight - catSize - window.innerHeight * 0.04;

    mouthX = catX + catSize * 0.68;
    mouthY = catY + catSize * 0.46;
}
        catImg.onload = updateCatPosition;
        window.addEventListener('resize', updateCatPosition);

        const texts = [
            "Mong sao em luôn cười tươi",
            "Chúc mừng sinh nhật em❤️",
            "Gửi em..."
            
        ];
        let textIndex = 0;
        let particles = [];
        const colors = ['#ff3366', '#ff5c8a', '#ff85a2', '#fbb1bd', '#f7cad0'];

        function drawHeart(x, y, size, color, alpha) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y + size / 4);
            ctx.bezierCurveTo(x, y - size / 2, x - size, y - size / 2, x - size, y + size / 4);
            ctx.bezierCurveTo(x - size, y + (size * 0.9), x, y + size * 1.3, x, y + size * 1.4);
            ctx.bezierCurveTo(x, y + size * 1.3, x + size, y + (size * 0.9), x + size, y + size / 4);
            ctx.bezierCurveTo(x + size, y - size / 2, x, y - size / 2, x, y + size / 4);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // Đối tượng Hạt Trái Tim cải tiến thuật toán vật lý
      class HeartParticle {
    constructor(targetX, targetY, delay) {

        this.x = mouthX;
        this.y = mouthY;

        this.tx = targetX;
        this.ty = targetY;

        this.delay = delay;

        this.size = 2 + Math.random() * 3;
        this.color = colors[Math.floor(Math.random()*colors.length)];

        const angle =
            -Math.PI/3 +
            (Math.random()-0.5)*0.5;

        const speed = 10 + Math.random()*8;

        this.vx = Math.cos(angle)*speed;
        this.vy = Math.sin(angle)*speed;

        this.alpha = 0;

        this.age = 0;

        this.mode = 0;
        //0 = bắn
        //1 = hút
        //2 = đứng yên

        this.switchTime = 30 + Math.random()*25;
    }

    update(){

        if(this.delay>0){
            this.delay--;
            return;
        }

        this.age++;

        this.alpha=Math.min(1,this.alpha+0.06);

        if(this.mode===0){

            //bay tự do

            this.vy+=0.12;

            this.vx*=0.985;
            this.vy*=0.985;

            this.x+=this.vx+Math.sin(this.age*0.25)*0.6;
            this.y+=this.vy;

            if(this.age>this.switchTime){
                this.mode=1;
            }

        }else if(this.mode===1){

            //hút vào chữ

            const dx=this.tx-this.x;
            const dy=this.ty-this.y;

            this.vx+=dx*0.045;
            this.vy+=dy*0.045;

            this.vx*=0.82;
            this.vy*=0.82;

            this.x+=this.vx;
            this.y+=this.vy;

            if(Math.abs(dx)<0.6 && Math.abs(dy)<0.6){

                this.x=this.tx;
                this.y=this.ty;

                this.vx=0;
                this.vy=0;

                this.mode=2;

            }

        }

    }

    render(){

        if(this.delay>0)return;

        drawHeart(
            this.x,
            this.y,
            this.size,
            this.color,
            this.alpha
        );

    }

} 

        function createTextParticles(text) {
            particles = [];
            
            const memCanvas = document.createElement('canvas');
            const memCtx = memCanvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;

memCanvas.width = window.innerWidth * dpr;
memCanvas.height = window.innerHeight * dpr;

memCtx.scale(dpr, dpr);

           let fontSize = window.innerWidth < 768 ? 36 : 90;

do {
    memCtx.font = `900 ${fontSize}px Arial`;
    fontSize--;
} while (
    memCtx.measureText(text).width > window.innerWidth * 0.85 &&
    fontSize > 18
);
            memCtx.font = `bold ${fontSize}px 'Segoe UI', Arial`;
            memCtx.fillStyle = '#ffffff';
            memCtx.textAlign = 'center';
            memCtx.textBaseline = 'middle';
            
            // Căn chữ ở khoảng giữa màn hình lệch phải một tí để luồng tim phun tới đẹp mắt
            function drawText(ctx, text, x, y, maxWidth, lineHeight){

    const words = text.split(" ");
    const lines = [];
    let line = "";

    for(const word of words){

        const test = line + word + " ";

        if(ctx.measureText(test).width > maxWidth && line !== ""){

            lines.push(line.trim());
            line = word + " ";

        }else{

            line = test;

        }

    }

    lines.push(line.trim());

    // Căn giữa theo số dòng
    const startY = y - ((lines.length - 1) * lineHeight) / 2;

    lines.forEach((line, i)=>{

        ctx.fillText(
            line,
            x,
            startY + i * lineHeight
        );

    });

}
            drawText(
    memCtx,
    text,
    window.innerWidth / 2,
    window.innerHeight * 0.30,
    window.innerWidth * 0.90,
    fontSize * 1.3
);

            const imgData = memCtx.getImageData(0, 0, memCanvas.width, memCanvas.height);
            const step = window.innerWidth < 480 ? 2 : 3;

            let rawPoints = [];
            for (let y = 0; y < memCanvas.height; y += step) {
                for (let x = 0; x < memCanvas.width; x += step) {
                    const index = (y * memCanvas.width + x) * 4;
                    if (imgData.data[index + 3] > 128) {
                        rawPoints.push({x, y});
                    }
                }
            }

            // Xáo trộn ngẫu nhiên thứ tự hạt để lúc phun ra tạo thành luồng hỗn độn tự nhiên thay vì phun theo hàng lối
            rawPoints.sort(()=>Math.random()-0.5);

rawPoints.sort(() => Math.random() - 0.5);

rawPoints.forEach((pt, i) => {
    particles.push(
        new HeartParticle(
            pt.x,
            pt.y,
            i * 1.2
        )
    );
});
        }

        // Đổi câu chữ sau mỗi 6 giây (tăng thêm thời gian để kịp ngắm chữ sau khi xếp xong)
        setInterval(()=>{

    textIndex++;

    if(textIndex>=texts.length)
        textIndex=0;

    createTextParticles(texts[textIndex]);

},8500);

        function animate() {
            // Hiệu ứng vệt mờ (Trail) mượt mà cho trái tim bay
ctx.fillStyle = "rgba(5,5,15,0.15)";
ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (catImg.complete) {
                ctx.drawImage(catImg, catX, catY, catSize, catSize);
            }

            particles.forEach(p => {
                p.update();
                p.render();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
