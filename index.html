<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mèo Bắn Tim Ra Chữ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Nền đen hoàn toàn hợp với ảnh chú mèo */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="loveCanvas"></canvas>

    <script>
        const canvas = document.getElementById('loveCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Tải hình ảnh chú mèo
        const catImg = new Image();
        catImg.src = 'cat.jpg'; // Đổi thành 'cat.jpg' nếu bạn đã đổi tên ảnh

        // Tọa độ miệng chú mèo (sẽ tính toán sau khi ảnh tải xong)
        let catX = 50;
        let catY = 0;
        let mouthX = 0;
        let mouthY = 0;
        const catSize = 150; // Kích thước hiển thị của chú mèo

        catImg.onload = () => {
            updateCatPosition();
        };

        function updateCatPosition() {
            // Đặt mèo ở góc dưới bên trái
            catY = window.innerHeight - catSize - 20;
            // Tọa độ điểm phát ra tim (ước lượng vị trí miệng chú mèo trong ảnh)
            mouthX = catX + (catSize * 0.6); 
            mouthY = catY + (catSize * 0.45);
        }
        window.addEventListener('resize', updateCatPosition);

        // Danh sách các câu chữ
        const texts = [
            "Gửi em...",
            "Mong sao em luôn cười tươi",
            "Valentine vui vẻ và hạnh phúc",
            "I LOVE YOU ❤️"
        ];
        let textIndex = 0;
        let particles = [];
        const colors = ['#ff4d6d', '#ff758f', '#ff8fa3', '#ffb3c1', '#fae0e4'];

        // Hàm vẽ hình trái tim nhỏ bằng Canvas đường cong Bezier
        function drawHeart(x, y, size, color, alpha) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y + size / 4);
            ctx.bezierCurveTo(x, y - size / 2, x - size, y - size / 2, x - size, y + size / 4);
            ctx.bezierCurveTo(x - size, y + (size * 0.9), x, y + size * 1.3, x, y + size * 1.4);
            ctx.bezierCurveTo(x, y + size * 1.3, x + size, y + (size * 0.9), x + size, y + size / 4);
            ctx.bezierCurveTo(x + size, y - size / 2, x, y - size / 2, x, y + size / 4);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // Lớp đối tượng Hạt Trái Tim
        class HeartParticle {
            constructor(targetX, targetY) {
                // Xuất phát chuẩn xác từ miệng chú mèo
                this.x = mouthX;
                this.y = mouthY;
                
                this.targetX = targetX;
                this.targetY = targetY;
                
                // Kích thước tim ngẫu nhiên từ 3 đến 5px
                this.size = Math.random() * 2 + 3;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // Lực đẩy ban đầu hướng vút lên trên và hơi lệch sang phải giống hiệu ứng thổi
                this.vx = Math.random() * 15 + 5;
                this.vy = -Math.random() * 20 - 10;
                
                this.friction = 0.88; // Giữ lực cản vừa phải để hạt có độ lướt
                this.ease = 0.08;      // Độ mượt khi hút vào khung chữ
                this.opacity = Math.random() * 0.4 + 0.6;
            }

            update() {
                // Hút hạt về phía tọa độ chữ
                this.vx += (this.targetX - this.x) * this.ease;
                this.vy += (this.targetY - this.y) * this.ease;
                
                this.vx *= this.friction;
                this.vy *= this.friction;

                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                drawHeart(this.x, this.y, this.size, this.color, this.opacity);
            }
        }

        // Tạo chữ từ các hạt tim
        function createTextParticles(text) {
            particles = [];
            
            const memCanvas = document.createElement('canvas');
            const memCtx = memCanvas.getContext('2d');
            memCanvas.width = window.innerWidth;
            memCanvas.height = window.innerHeight;

            let fontSize = Math.min(window.innerWidth / 15, 55);
            memCtx.font = `bold ${fontSize}px 'Segoe UI', Arial`;
            memCtx.fillStyle = '#ffffff';
            memCtx.textAlign = 'center';
            memCtx.textBaseline = 'middle';
            
            // Đẩy chữ lên cao một chút (khoảng 45% màn hình) để cân đối với chú mèo ở dưới
            memCtx.fillText(text, window.innerWidth / 2 + 50, window.innerHeight * 0.45);

            const imgData = memCtx.getImageData(0, 0, memCanvas.width, memCanvas.height);
            const step = window.innerWidth < 768 ? 5 : 7; // Khoảng cách giữa các hạt để tối ưu

            for (let y = 0; y < memCanvas.height; y += step) {
                for (let x = 0; x < memCanvas.width; x += step) {
                    const index = (y * memCanvas.width + x) * 4;
                    const alpha = imgData.data[index + 3];
                    
                    if (alpha > 128) {
                        particles.push(new HeartParticle(x, y));
                    }
                }
            }
        }

        // Đổi chữ sau mỗi 4.5 giây
        setInterval(() => {
            textIndex = (textIndex + 1) % texts.length;
            createTextParticles(texts[textIndex]);
        }, 4500);

        // Khởi chạy câu đầu tiên
        setTimeout(() => {
            createTextParticles(texts[textIndex]);
        }, 500); // Đợi ảnh load ổn định rồi bắn chữ

        // Vòng lặp hoạt hình
        function animate() {
            // Tạo hiệu ứng đuôi mờ lấp lánh (Trail Effect)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Vẽ chú mèo ở góc dưới màn hình
            if (catImg.complete) {
                ctx.drawImage(catImg, catX, catY, catSize, catSize);
            }

            // Cập nhật và vẽ các hạt trái tim
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
